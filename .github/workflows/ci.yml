name: Java CI with Maven

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 🔨 Build project
      run: |
        cd XinNghiPhep
        mvn -B clean install

    - name: 🧪 Run tests
      run: |
        cd XinNghiPhep
        mvn -B test

    # OPTIONAL: Lint (Checkstyle) - nếu có config trong pom.xml
    - name: 🔍 Checkstyle
      run: |
        cd XinNghiPhep
        mvn checkstyle:check
      continue-on-error: true   # không fail CI nếu chưa config